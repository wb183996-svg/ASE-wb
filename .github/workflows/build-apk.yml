name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build React App and Capacitor Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build React SPA Web App
        run: npm run build

      - name: Setup Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor Sync
        run: npx cap sync

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Locate APK File
        run: |
          echo "Finding generated APKs..."
          find android/app/build/outputs/apk/ -name "*.apk"

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ASE-Workbook-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # If this is triggered by a tag (e.g. v1.5.0), create a GitHub Release and attach the APK
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
